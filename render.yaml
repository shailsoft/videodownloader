services:
  - type: web
    name: shailsoft-videodownloader-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGIN
        value: https://shailsoft.github.io,https://shailsoft-videodownloader.onrender.com,http://localhost:5173
      - key: MAX_DURATION_SECONDS
        value: 3600
      - key: YTDLP_COOKIES_FILE
        value: /etc/secrets/cookies.txt

  - type: web
    name: shailsoft-videodownloader
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_BASE_PATH
        value: /
      - key: VITE_API_BASE
        value: https://shailsoft-videodownloader-api.onrender.com/api
      - key: VITE_USE_MOCK
        value: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
